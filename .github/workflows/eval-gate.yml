name: eval-gate

# Quality gate for PRs: retrieval evals run fully in CI; the generation eval is
# verified against its committed, hash-stamped result (no Ollama in CI). A drop
# below eval/thresholds.yaml — or a stale generation result — blocks merge.

on:
  pull_request:

jobs:
  retrieval-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 2s --health-timeout 2s --health-retries 15
      redis:
        image: redis:8
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s --health-timeout 2s --health-retries 15
    env:
      RAG_DATABASE_URL: postgresql://rag:rag@localhost:5433/rag
      RAG_REDIS_URL: redis://localhost:6380/0
      RAG_REQUIRE_LLM: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-bge-small-v1
      - run: uv sync --locked
      - name: Ingest committed corpus (real bge-small embeddings)
        run: uv run rag-ingest
      - name: Retrieval eval gate
        run: uv run python -m eval.gate --suite retrieval

  generation-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      # no DB/Ollama needed: verifies the committed generation result is fresh
      # (golden_hash matches) and above thresholds.
      - name: Generation eval gate (committed-result verification)
        run: uv run python -m eval.gate --suite generation
