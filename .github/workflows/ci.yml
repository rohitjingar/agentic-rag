name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
      redis:
        image: redis:8
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      RAG_DATABASE_URL: postgresql://rag:rag@localhost:5433/rag
      RAG_REDIS_URL: redis://localhost:6380/0
      RAG_REQUIRE_LLM: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -q
